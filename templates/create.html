{% extends "base.html" %}
{% block title %}Create Items — FastAPI Items{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Create Items</h1>
    <p>Add one or more items to the database</p>
</div>

<div class="card card-pad">
    <h2 style="margin-bottom: 20px;">Add Items</h2>
    <form id="createForm">
        <div id="itemsContainer">
            <div class="card" style="margin-bottom: 20px; padding: 20px; background: var(--bg-card);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="font-size: 14px; color: var(--text-muted);">Item #1</h3>
                </div>
                <div class="form-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                    <div class="form-group">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" name="id" required placeholder="Enter ID">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="Enter item name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" class="form-control" name="price" required placeholder="Enter price">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date Posted</label>
                        <input type="date" class="form-control" name="date_posted" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="2" placeholder="Enter description"></textarea>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label">Note</label>
                        <textarea class="form-control" name="Note" rows="2" placeholder="Enter note"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button type="button" onclick="addItem()" class="btn btn-ghost">
                <i class="fas fa-plus"></i> Add Another Item
            </button>
            <button type="button" onclick="submitForm()" class="btn btn-primary">
                <i class="fas fa-save"></i> Submit Items
            </button>
        </div>
    </form>
</div>

<div id="result" style="display: none; margin-top: 32px;"></div>

<script>
let itemCount = 1;

function addItem() {
    itemCount++;
    const container = document.getElementById('itemsContainer');
    const newItem = document.createElement('div');
    newItem.className = 'card';
    newItem.style.marginBottom = '20px';
    newItem.style.padding = '20px';
    newItem.style.background = 'var(--bg-card)';
    newItem.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="font-size: 14px; color: var(--text-muted);">Item #${itemCount}</h3>
            <button type="button" onclick="removeItem(this)" class="btn btn-ghost" style="padding: 6px 12px; font-size: 12px;">
                <i class="fas fa-times"></i> Remove
            </button>
        </div>
        <div class="form-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
            <div class="form-group">
                <label class="form-label">ID</label>
                <input type="number" class="form-control" name="id" required placeholder="Enter ID">
            </div>
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" name="name" required placeholder="Enter item name">
            </div>
            <div class="form-group">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" class="form-control" name="price" required placeholder="Enter price">
            </div>
            <div class="form-group">
                <label class="form-label">Date Posted</label>
                <input type="date" class="form-control" name="date_posted" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="2" placeholder="Enter description"></textarea>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Note</label>
                <textarea class="form-control" name="Note" rows="2" placeholder="Enter note"></textarea>
            </div>
        </div>
    `;
    container.appendChild(newItem);
}

function removeItem(button) {
    const itemDiv = button.closest('.card');
    itemDiv.remove();
    itemCount--;
}

async function submitForm() {
    const form = document.getElementById('createForm');
    const items = [];
    
    // Collect all item data
    const itemDivs = document.querySelectorAll('#itemsContainer .card');
    itemDivs.forEach(div => {
        const inputs = div.querySelectorAll('input, textarea');
        const item = {};
        inputs.forEach(input => {
            item[input.name] = input.value;
        });
        items.push(item);
    });

    try {
        const response = await fetch('/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(items)
        });

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';

        if (response.ok) {
            const data = await response.json();
            resultDiv.innerHTML = `
                <div class="alert alert-success">
                    <div class="alert-title"><i class="fas fa-check-circle"></i> Success!</div>
                    <div class="alert-body">Created ${data.length} item${data.length !== 1 ? 's' : ''} successfully.</div>
                </div>
                <div class="card card-pad" style="margin-top: 16px;">
                    <h3 style="margin-bottom: 16px;">Created Items</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Description</th>
                                    <th>Note</th>
                                    <th>Date Posted</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(item => `
                                    <tr>
                                        <td><span style="color: var(--primary); font-weight: 600;">${item.id}</span></td>
                                        <td>${item.name}</td>
                                        <td>$${parseFloat(item.price).toFixed(2)}</td>
                                        <td>${item.description}</td>
                                        <td>${item.note}</td>
                                        <td>${item.date_posted}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            form.reset();
            // Reset to single item form
            document.getElementById('itemsContainer').innerHTML = itemDivs[0].innerHTML;
        } else {
            const error = await response.json();
            resultDiv.innerHTML = `
                <div class="alert alert-danger">
                    <div class="alert-title"><i class="fas fa-exclamation-circle"></i> Error</div>
                    <div class="alert-body">${error.detail || 'Failed to create items'}</div>
                </div>
            `;
        }
    } catch (error) {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                <div class="alert-title"><i class="fas fa-exclamation-circle"></i> Network Error</div>
                <div class="alert-body">Failed to connect to server. Make sure the server is running.</div>
            </div>
        `;
    }
}
</script>

{% endblock %}
